<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InsideForestVisual - Generado en Python</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
  <main class="max-w-6xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-2">InsideForestVisual - HTML Generado</h1>
    <p class="text-slate-300 mb-4">Dataset: housing_sintetico | Filas usadas: 2500 | Features: income_k, rooms, distance_km, crime_index</p>
    <p class="text-slate-400 mb-4 text-sm">Sampling: activo (random)</p>
    <h2 class="text-xl font-semibold mt-6">Ranking (TVD)</h2>
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm mt-2 border border-slate-800">
        <thead><tr class="bg-slate-900"><th class="p-2">ID</th><th class="p-2">Experimento</th><th class="p-2">TVD</th><th class="p-2">A|I|B</th></tr></thead>
        <tbody>
          <tr><td class="p-2">1</td><td class="p-2">Suburbio premium vs riesgo</td><td class="p-2">0.883</td><td class="p-2">242|0|813</td></tr><tr><td class="p-2">2</td><td class="p-2">Cercanía urbana</td><td class="p-2">0.232</td><td class="p-2">578|0|888</td></tr>
        </tbody>
      </table>
    </div>

    <h2 class="text-xl font-semibold mt-6">Configuración embebida</h2>
    <pre class="text-xs bg-slate-900 p-4 rounded border border-slate-800 overflow-auto" id="payload"></pre>
  </main>
  <script>
    const payload = {"dataset_config": {"dataset_id": "housing_sintetico", "feature_columns": ["income_k", "rooms", "distance_km", "crime_index"], "target_column": "price_k", "id_column": "house_id", "missing_strategy": "drop", "scaling_mode_default": "zscore", "random_seed": 98765, "sampling_threshold": 2500, "sample_size": 2500, "sampling_strategy": "stratified", "target_mode": "regression_deciles", "regression_bins": 10}, "sampling_info": {"applied": true, "strategy": "random", "original_rows": 3500, "final_rows": 2500, "threshold": 2500, "sample_size": 2500}, "target_mode_info": {"requested": "regression_deciles", "effective": "regression_deciles", "bins": 10}, "evaluation_config": {"primary_metric": "tvd", "min_samples_only_a": 5, "min_samples_only_b": 5, "ranking_order": "desc"}, "experiments": [{"id": 1, "name": "Suburbio premium vs riesgo", "description": "Compara zonas con ingresos altos contra zonas con mayor crimen", "target_column": "price_k", "enabled": true, "tags": ["regression", "deciles"], "rules": {"intersection": [{"field": "rooms", "min": 3.0, "max": 8.0, "native": "raw"}], "only_cluster_a": [{"field": "income_k", "min": 85, "max": 180, "native": "raw"}, {"field": "crime_index", "min": 5, "max": 35, "native": "raw"}], "only_cluster_b": [{"field": "income_k", "min": 8, "max": 80, "native": "raw"}, {"field": "crime_index", "min": 35, "max": 90, "native": "raw"}]}}, {"id": 2, "name": "Cercanía urbana", "description": "Efecto de distancia y densidad de habitaciones", "target_column": "price_k", "enabled": true, "tags": ["regression"], "rules": {"intersection": [{"field": "income_k", "min": -1.0, "max": 2.5, "native": "scaled"}], "only_cluster_a": [{"field": "distance_km", "min": 0.2, "max": 12.0, "native": "raw"}], "only_cluster_b": [{"field": "distance_km", "min": 20.0, "max": 60.0, "native": "raw"}]}}], "ranking": [{"id": 1, "name": "Suburbio premium vs riesgo", "tvd": 0.883012, "onlyA": 242, "intersection": 0, "onlyB": 813}, {"id": 2, "name": "Cercanía urbana", "tvd": 0.232192, "onlyA": 578, "intersection": 0, "onlyB": 888}]};
    document.getElementById('payload').textContent = JSON.stringify(payload, null, 2);
  </script>
</body>
</html>
